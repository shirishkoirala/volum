services:
  volum:
    build: .
    container_name: volum
    ports:
      - "8090:8090"
    volumes:
      - /mnt:/mnt
      - /opt/docker:/opt/docker
      - /opt/docker/volum:/data
    environment:
      - VOLUM_ROOTS=/mnt/storage,/mnt/data1,/mnt/data2,/mnt/backup,/opt/docker
      - VOLUM_DB=/data/volum.db
      - VOLUM_PORT=8090
    restart: unless-stopped
