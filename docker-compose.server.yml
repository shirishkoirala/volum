services:
  volum:
    build: .
    container_name: volum
    ports:
      - "${VOLUM_BIND_ADDRESS:-127.0.0.1}:${VOLUM_PORT:-8090}:${VOLUM_PORT:-8090}"
    volumes:
      - type: bind
        source: ${VOLUM_HOST_PATH:-./storage}
        target: /host
        bind:
          propagation: rslave
      - type: bind
        source: ./data
        target: /data
    environment:
      - VOLUM_AUTH_REQUIRED=${VOLUM_AUTH_REQUIRED:-true}
      - VOLUM_SESSION_SECRET=${VOLUM_SESSION_SECRET}
      - VOLUM_BOOTSTRAP_TOKEN=${VOLUM_BOOTSTRAP_TOKEN:-}
      - VOLUM_INCLUDE_ROOT=${VOLUM_INCLUDE_ROOT:-true}
      - VOLUM_DISCOVER_ROOTS=${VOLUM_DISCOVER_ROOTS:-true}
      - VOLUM_HOST_ROOT=${VOLUM_HOST_ROOT:-/host}
      - VOLUM_ROOTS=${VOLUM_ROOTS:-}
      - VOLUM_DB=${VOLUM_DB:-/data/volum.db}
      - VOLUM_PORT=${VOLUM_PORT:-8090}
      - VOLUM_HOME=${VOLUM_HOME:-}
      - VOLUM_PUBLIC_URL=${VOLUM_PUBLIC_URL:-}
      - VOLUM_ALLOWED_HOSTS=${VOLUM_ALLOWED_HOSTS:-localhost,127.0.0.1}
    user: "${VOLUM_UID:-1000}:${VOLUM_GID:-1000}"
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
