# Local quick-start: docker compose up -d
# Open http://localhost:8090 — no auth required, bound to localhost.
# Files go in ./storage, database in ./data.
#
# For published releases, replace "build: ." with:
#   image: ghcr.io/shirishkoirala/volum:latest

services:
  volum:
    build: .
    container_name: volum
    ports:
      - "${VOLUM_BIND_ADDRESS:-127.0.0.1}:${VOLUM_PORT:-8090}:${VOLUM_PORT:-8090}"
    volumes:
      - ${VOLUM_DATA_DIR:-./data}:/data
      - ${VOLUM_STORAGE:-./storage}:/storage
    environment:
      - VOLUM_ROOTS=${VOLUM_ROOTS:-/storage}
      - VOLUM_DB=${VOLUM_DB:-/data/volum.db}
      - VOLUM_PORT=${VOLUM_PORT:-8090}
      - VOLUM_AUTH_REQUIRED=${VOLUM_AUTH_REQUIRED:-false}
      - VOLUM_ALLOW_INSECURE_AUTH_DISABLED=${VOLUM_ALLOW_INSECURE_AUTH_DISABLED:-true}
      - VOLUM_SESSION_SECRET=${VOLUM_SESSION_SECRET:-}
      - VOLUM_PUBLIC_URL=${VOLUM_PUBLIC_URL:-}
    restart: unless-stopped
