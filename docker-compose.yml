services:
  volum:
    build: .
    container_name: volum
    ports:
      - "8090:8090"
    volumes:
      - ./storage:/storage
      - ./data:/data
    environment:
      - VOLUM_ROOTS=/storage
      - VOLUM_DB=/data/volum.db
      - VOLUM_PORT=8090
      # Set these to enable login and protect write APIs.
      # - VOLUM_ADMIN_PASSWORD=change-me
      # - VOLUM_READONLY_PASSWORD=view-only
      # - VOLUM_SESSION_SECRET=replace-with-a-long-random-string
    restart: unless-stopped
