<svg width="1332" height="1180" viewBox="0 0 1332 1180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="folderGrad" x1="150" y1="110" x2="1040" y2="840" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2F92FF"/>
      <stop offset="0.48" stop-color="#2085F6"/>
      <stop offset="1" stop-color="#1577EE"/>
    </linearGradient>
    <linearGradient id="folderLight" x1="200" y1="86" x2="1045" y2="362" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#66B7FF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#61B6FF" stop-opacity="0.42"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="150" y1="360" x2="1150" y2="1015" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#DDF0FF" stop-opacity="0.68"/>
      <stop offset="0.40" stop-color="#5FABFF" stop-opacity="0.53"/>
      <stop offset="0.78" stop-color="#4A9AF6" stop-opacity="0.57"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="glassEdge" x1="140" y1="340" x2="1220" y2="1020" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="0.5" stop-color="#E4F3FF" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#B7D7FF" stop-opacity="0.72"/>
    </linearGradient>
    <linearGradient id="leftGlass" x1="145" y1="350" x2="280" y2="1040" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EAF6FF" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.34"/>
    </linearGradient>
    <filter id="shadow" x="10" y="15" width="1300" height="1140" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="36" stdDeviation="40" flood-color="#1D5CA5" flood-opacity="0.35"/>
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0C3B74" flood-opacity="0.16"/>
    </filter>
    <filter id="glassBlur" x="90" y="320" width="1180" height="780" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
    <clipPath id="glassClip">
      <rect x="132" y="368" width="1065" height="704" rx="82"/>
    </clipPath>
  </defs>

  <g filter="url(#shadow)">
    <!-- rear folder -->
    <path d="M40 158C40 100 87 53 145 53H465C503 53 539 70 562 101L641 205C658 228 684 241 713 241H1106C1164 241 1211 288 1211 346V772C1211 830 1164 877 1106 877H145C87 877 40 830 40 772V158Z" fill="url(#folderGrad)"/>
    
    <!-- lighter folded/top surface -->
    <path d="M168 53H465C503 53 539 70 562 101L641 205C658 228 684 241 713 241H1106C1164 241 1211 288 1211 346V360C1211 383 1192 402 1169 402C1146 402 1127 383 1127 360C1127 337 1108 318 1085 318H650C613 318 578 301 556 271L480 169C463 146 436 132 407 132H170C146 132 127 113 127 90C127 69 145 53 168 53Z" fill="url(#folderLight)"/>
    
    <!-- lower folder depth -->
    <path d="M40 402H1211V772C1211 830 1164 877 1106 877H145C87 877 40 830 40 772V402Z" fill="#1377F2" fill-opacity="0.22"/>

    <!-- glass/front panel -->
    <g filter="url(#glassBlur)">
      <rect x="132" y="368" width="1065" height="704" rx="82" fill="url(#glassGrad)"/>
      <rect x="132" y="368" width="1065" height="704" rx="82" stroke="url(#glassEdge)" stroke-width="7"/>
    </g>

    <!-- frosted white bottom band -->
    <g clip-path="url(#glassClip)">
      <rect x="132" y="903" width="1065" height="169" fill="#FFFFFF" fill-opacity="0.78"/>
      <rect x="132" y="368" width="142" height="704" fill="url(#leftGlass)"/>
      <rect x="274" y="368" width="66" height="704" fill="#FFFFFF" fill-opacity="0.28"/>
      <path d="M132 368H1197V471H132V368Z" fill="#FFFFFF" fill-opacity="0.18"/>
    </g>
  </g>
</svg>
