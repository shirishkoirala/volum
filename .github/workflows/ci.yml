name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '23 4 * * 1'

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npx tsc --noEmit
      - run: npm run format:check
      - run: npm run lint
      - run: npm run test:ci
      - name: Coverage (informational)
        run: npm run test:coverage
        continue-on-error: true
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum
      - run: go mod download
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.3.1
          working-directory: backend
      - run: go vet ./...
      - run: go test ./...
      - name: Coverage (informational)
        run: go test -coverprofile=coverage.out -covermode=atomic ./...
        continue-on-error: true
      - run: go build ./cmd/volum
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: ShellCheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck scripts/*.sh frontend/scripts/*.sh
      - name: Verify CONTRIBUTING.md commands match Makefile
        run: |
          for cmd in $(grep -oP '`make \K[a-z-]+' CONTRIBUTING.md | sort -u); do
            if ! grep -q "^$cmd:" Makefile; then
              echo "ERROR: CONTRIBUTING.md references 'make $cmd' but Makefile has no '$cmd' target"
              exit 1
            fi
          done
          echo "All CONTRIBUTING.md make targets exist in Makefile"
      - name: Lychee link check
        if: github.event_name == 'schedule'
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose --no-progress --exclude 'localhost|127\.0\.0\.1'
            './**/*.md' './**/*.html' '!./frontend/node_modules' '!./.git'
          fail: false

  smoke:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Basic smoke test
        run: ./scripts/smoke.sh 8091
        timeout-minutes: 10
      - name: Reverse-proxy upload smoke test
        run: ./scripts/smoke-reverse-proxy-upload.sh 18092
        timeout-minutes: 10
