name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/volum
  DOCKERHUB_IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/volum

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend checks
        working-directory: frontend
        run: |
          npm ci
          npm run typecheck
          npm run format:check
          npm run lint
          npm run test:ci
          npm run build

      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum

      - name: Backend dependencies
        working-directory: backend
        run: go mod download

      - name: Backend lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: backend
          args: --timeout=10m

      - name: Backend checks
        working-directory: backend
        run: |
          go vet ./...
          go test ./...
          go build ./cmd/volum

  docker:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          case "${version}" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Version must look like v0.1.0, got ${version}" >&2; exit 1 ;;
          esac
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "version_number=${version#v}" >> "${GITHUB_OUTPUT}"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Volum
            org.opencontainers.image.description=Self-hosted desktop-style file manager for home servers and Docker hosts
            org.opencontainers.image.vendor=Volum
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VITE_PUBLIC_PATH=
            VERSION=${{ steps.version.outputs.version }}
            BUILD_TIME=${{ steps.version.outputs.build_time }}
            RUN_BACKEND_CHECKS=false
            RUN_FRONTEND_CHECKS=false
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=release
          cache-to: type=gha,scope=release,mode=max

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            echo "Release ${VERSION} already exists"
          else
            gh release create "${VERSION}" \
              --title "Volum ${VERSION}" \
              --notes-file CHANGELOG.md
          fi
