services:
  api:
    build: .
    ports:
      - "8090:8090"
    volumes:
      - ./storage:/storage
      - ./data:/data
    environment:
      - VOLUM_ROOTS=${VOLUM_ROOTS:-/storage}
      - VOLUM_DB=${VOLUM_DB:-/data/volum.db}
      - VOLUM_PORT=8090
      - VOLUM_HOME=${VOLUM_HOME:-}
      - VOLUM_AUTH_REQUIRED=${VOLUM_AUTH_REQUIRED:-true}
      - VOLUM_SESSION_SECRET=${VOLUM_SESSION_SECRET:-volum-development-session-secret}
      # Explicit dev defaults (not inherited from .env):
      - VOLUM_INCLUDE_ROOT=false
      - VOLUM_DISCOVER_ROOTS=false
      - VOLUM_HOST_ROOT=
      - VOLUM_PUBLIC_URL=http://localhost:8342
      - VOLUM_ALLOWED_HOSTS=localhost,127.0.0.1,api

  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev"
    ports:
      - "8342:5173"
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    environment:
      - VITE_API_PROXY_TARGET=http://api:8090
    depends_on:
      - api

volumes:
  frontend_node_modules:
