services:
  api:
    build: .
    ports:
      - "8090:8090"
    volumes:
      - ./storage:/storage
      - ./data:/data
    environment:
      - VOLUM_ROOTS=${VOLUM_ROOTS:-/storage}
      - VOLUM_DB=${VOLUM_DB:-/data/volum.db}
      - VOLUM_PORT=${VOLUM_PORT:-8090}
      # Set these to enable login in dev.
      # - VOLUM_ADMIN_PASSWORD=admin
      # - VOLUM_READONLY_PASSWORD=readonly
      # - VOLUM_SESSION_SECRET=dev-secret

  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev"
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    environment:
      - VITE_API_PROXY_TARGET=http://api:8090
    depends_on:
      - api

volumes:
  frontend_node_modules:
